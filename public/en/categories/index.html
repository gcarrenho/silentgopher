<script>
document.addEventListener('DOMContentLoaded', () => {
    
    const themeToggles = document.querySelectorAll('.theme-toggle');
    
    
    const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    const currentTheme = localStorage.getItem('theme');

    
    if (currentTheme === 'dark' || (!currentTheme && prefersDark)) {
        document.documentElement.setAttribute('data-theme', 'dark');
        themeToggles.forEach(btn => btn.textContent = '☀️');
    } else {
        document.documentElement.setAttribute('data-theme', 'light');
        themeToggles.forEach(btn => btn.textContent = '🌙');
    }

    
    themeToggles.forEach(button => {
        button.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            if (current === 'light') {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggles.forEach(btn => btn.textContent = '☀️');
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                themeToggles.forEach(btn => btn.textContent = '🌙');
                localStorage.setItem('theme', 'light');
            }
        });
    });

    
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
        if (!localStorage.getItem('theme')) {
            const newTheme = e.matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            themeToggles.forEach(btn => btn.textContent = newTheme === 'dark' ? '☀️' : '🌙');
        }
    });
});
</script>



<script>
  const input = document.getElementById('searchInput');
  const cards = document.querySelectorAll('.blog-card-wrapper');
  const noResults = document.getElementById('noResults');
  const searchCount = document.getElementById('searchCount');

  input.addEventListener('input', () => {
    const filter = input.value.toLowerCase().trim();
    let visible = 0;

    cards.forEach(card => {
      const title = card.dataset.title || '';
      const tags = card.dataset.tags || '';
      const match = !filter || title.includes(filter) || tags.includes(filter);
      card.style.display = match ? '' : 'none';
      if (match) visible++;
    });

    noResults.style.display = (filter && visible === 0) ? 'flex' : 'none';
    searchCount.textContent = filter ? `${visible} resultado${visible !== 1 ? 's' : ''}` : '';
  });
</script>
